function mouseMove(e)
{
		var rect = e.target.getBoundingClientRect();
    mx = e.clientX - rect.left; //x position within the element.
    my = e.clientY - rect.top;  //y position within the element

    mx = Math.floor((mx-gridOffs)/gridSize); // -Math.floor(gridW/2);
    my = Math.floor((my-gridOffs)/gridSize); // -Math.floor(gridH/2);

    var xoffs=0;
    if(mode==TILESET){
        // Tile Set Drawing Mode 
        xoffs=11;
    }else{
        xoffs=10;
    }

    var found=false;
    if(my>=0&&my<pentominos.length){
        if((mx-xoffs)>=0 && (mx-xoffs)<pentominos[my].pos.length){
            found=true;
            highSet=my;
            highTile=mx-xoffs;
        }
    }
    if(!found){
        highSet=-1;
        highTile=-1;
    }
}

// Reads tile on given coordinate
function readTile(xk,yk)
{
    // We return tile 
    if(xk>=0&&xk<gridW&&yk>=0&&yk<gridH){
        return mapp[yk][xk].tileno;
    }else{
        return -1;
    }
}

 function mouseDown(e)
 {
    e.preventDefault();

    if(mode==TILEDRAW){
        // Tile Drawing Mode
        if(my>=0&&my<pentominos.length){
            if((mx-10)>=0 && (mx-10)<pentominos[my].pos.length){
                currSet=my;
                currTile=mx-10;
            }
        }
        if(my>=0&&mx<gridW&&mx>=0&&my<gridH){

        }
    }else{
        // Tile set Painting Mode
        if(e.button==2){
            if(mx>HUDCOL&&my>=0&&my<=12){

            }else{
                if(mx>=0&&mx<gridW&&my>=0&&my<gridH){
                    mapp[my][mx].tileno=0;
                    mapp[my][mx].limit=0;
                }
            }
        }else if(e.button==0){
            if(mx==HUDCOL&&my==-1){
                //alert("Save!");
                
                var str="";
                str="[ ";
                var i=0;
                for(var yk=0;yk<gridH;yk++){
                    for(var xk=0;xk<gridW;xk++){
                        if (mapp[yk][xk].tileno>0){

                            str+=",limit: [";
                            if(mapp[yk][xk].limit!==undefined){
                                for(var j=0;j<mapp[yk][xk].limit.length;j++){
                                    if(j>0) str+=", ";
                                    str+=mapp[yk][xk].limit[j];
                                }
                            }

                            i++;

                    }
                }
                str+=" ]";
                alert(str);
            }
            if(mx>HUDCOL&&my>=0&&my<=12){

                // Check if inside pentomenu
                var xoffs=11;
                if(my>=0&&my<pentominos.length){
                    if((mx-xoffs)>=0 && (mx-xoffs)<pentominos[my].pos.length){
                        // This is the one we clear
                        clearMAPP();
                        placeTile(4,4,my,mx-xoffs);
                    }

            }
            if(mx<HUDCOL&&mx>0&&my>0&&my<9&&currSet>0){
                if(currSet==LIMITTILE){

                    var tileLeft=readTile(mx-1,my);
                    var tileRight=readTile(mx+1,my);

                    var limit=[];

                    // BELOW 1 5 6 9  11 12 13
                    if(tileBelow==1||tileBelow==5||tileBelow==6||tileBelow==9||tileBelow==11||tileBelow==12||tileBelow==13){
                        // Then this tile is limited to 2 7 8 10 11 12 13 (the opposite connector)
                        limit=[2, 7, 8, 10, 11, 12, 13];
                    }
                    
                    // ABOVE 2 7 8 10 11 12 13 
                    if(tileAbove==2||tileAbove==7||tileAbove==8||tileAbove==10||tileAbove==11||tileAbove==12||tileAbove==13){
                        // Then this tile is limited to 1 5 6 9  11 12 13 (the opposite connector)
                        limit=[1, 5, 6, 9,  11, 12, 13];
                    }
                    
                    // LEFT  4 6 8 9  10 12 13
                    if(tileLeft==4||tileLeft==6||tileLeft==8||tileLeft==9||tileLeft==10||tileLeft==12||tileLeft==13){
                        // Then this tile is limited to 1 5 6 9  11 12 13 (the opposite connector)
                        limit=[3, 5, 7, 9,  10, 11, 13];
                    }

                    if(tileRight==3||tileRight==5||tileRight==7||tileRight==9||tileRight==10||tileRight==11||tileRight==13){

                        limit=[4, 6, 8, 9,  10, 12, 13];

function clearMAPP()
{
    // Initiate mapp
    for(var j=0;j<gridH;j++){
        mapp[j]=[];
        for(var i=0;i<gridW;i++){
            // No limit
            var limit=[];

            // Create data object
            mapp[j][i]={xk:i,yk:j,limit:limit,tileno:0};
        }
    }
}

// Useful bits

function drawLine(x1,y1,x2,y2,width,color)
{
    c.strokeStyle=color;
    c.globalAlpha=1.0;
    c.lineWidth=width;

    c.beginPath();
    c.moveTo(x1,y1);
    c.lineTo(x2,y2);
    c.stroke();

    c.lineWidth=1.0;
}

function drawCirc(x1,y1,rad,width,color)
{
      c.strokeStyle=color;
      c.lineWidth=width;
      c.beginPath();
		  c.arc(x1, y1, rad, 0, 2 * Math.PI);
		  c.stroke();
      c.lineWidth=1.0; 				
}

function drawThickLine(x1,y1,x2,y2,linewidth,color)
{
    var dx=x2-x1;
    var dy=y2-y1;
    var len=Math.sqrt((dx*dx)+(dy*dy));
    var ox=(-dy/len)*linewidth;
    var oy=(dx/len)*linewidth;
    var sx=(dx/len)*linewidth;
    var sy=(dy/len)*linewidth;

    p1={x:x1,y:y1};
    p2={x:x1+sx+ox,y:y1+sy+oy};
    p3={x:x2-sx+ox,y:y2-sy+oy};
    p4={x:x2,y:y2};
    p5={x:x2-sx-ox,y:y2-sy-oy};
    p6={x:x1+sx-ox,y:y1+sy-oy};
    
    var pointlist=[p1,p2,p3,p4,p5,p6];
    c.fillStyle=color;
    drawSegments(pointlist,false);

}

function drawSegments(pointlist,kind)
{
    c.beginPath();
    for(var i=0;i<pointlist.length;i++){
        if(i==0){
            c.moveTo(pointlist[i].x,pointlist[i].y);
        }else{
            c.lineTo(pointlist[i].x,pointlist[i].y);        
        }
    }
    if(pointlist.length>0){
        c.lineTo(pointlist[0].x,pointlist[0].y);
    }

    if(kind){
        c.stroke();
    }else{
        c.fill();    
    }
}

function drawCross(xk,yk,length,linewidth,color)
{
    var p1={x:xk,y:yk-(linewidth*2)};
    var p2={x:(xk-length+linewidth),y:(yk-length-linewidth)};
    var p3={x:(xk-length-linewidth),y:(yk-length+linewidth)};    
    var p4={x:xk-(linewidth*2),y:yk};
    var p5={x:(xk-length-linewidth),y:(yk+length-linewidth)};
    var p6={x:(xk-length+linewidth),y:(yk+length+linewidth)}; 
    var p7={x:xk,y:yk+(linewidth*2)};
    var p8={x:(xk+length-linewidth),y:(yk+length+linewidth)};
    var p9={x:(xk+length+linewidth),y:(yk+length-linewidth)};
    var p10={x:xk+(linewidth*2),y:yk};
    var p11={x:(xk+length+linewidth),y:(yk-length+linewidth)};
    var p12={x:(xk+length-linewidth),y:(yk-length-linewidth)};

    var pointlist=[p1,p2,p3,p4,p5,p6,p7,p8,p9,p10,p11,p12];
    c.fillStyle=color;
    drawSegments(pointlist,false);
}

// We draw a simple tile that depicts the limit 
function drawLimit(x,y,tileW,tileH,linewidth,lineoffs,tileno)
{   
    c.globalAlpha=0.5;
    c.fillStyle="#68b"; 

    c.fillRect(x,y,tileW,tileH);

    c.globalAlpha=1.0;

    c.fillStyle="#000";
    c.fillText(tileno,x+(tileW*0.5),y+(tileH*0.5));
}

// We draw a tile with the following characteristics 
function drawTile(x,y,tileW,tileH,linewidth,lineoffs,tileno,limitlist)
{   
    var lo=lineoffs*0.25;
    if(tileno==LIMITTILE||tileno==CROSSTILE){
        c.fillStyle="#68b";        
    }else{
        c.fillStyle="#b86";    
    }
    pointlist=[{x:x+lo,y:y+lo},{x:x+lo,y:y+tileH-lo},{x:x+tileW-lo,y:y+tileH-lo},{x:x+tileW-lo,y:y+lo}];
    drawSegments(pointlist,false);

    if(tileno==CROSSTILE){
        drawCross(x+(tileW*0.5),y+(tileH*0.5),tileW*0.15,linewidth*0.5,"#A40");
    }
    if(tileno==LIMITTILE){
        // Draw all of the limits
        var soffs=tileW/6;
        var boffs=tileW/3;

        c.fillStyle="#343";
        c.font = Math.floor(boffs*0.9)+"px Arial Narrow";
        c.textBaseline="middle";
        c.textAlign="center";

        var ly=0;
        var lx=0;
        for(var limitno of limitlist){
            c.fillText(limitno,x+soffs+(lx*boffs),y+soffs+(ly*boffs));
            lx++;
            if(lx>2){
                lx=0;
                ly++;
            }            
        }
    }
    if(tileno==1||tileno==5||tileno==6||tileno==6||tileno==9||tileno==11||tileno==12||tileno==13){
        // Top connectior
        drawThickLine( x+(tileW*0.5)-(lineoffs*0.5),y, x+(tileW*0.5)-(lineoffs*1.0),y+(lineoffs*2), linewidth, "#000");
        drawThickLine( x+(tileW*0.5)+(lineoffs*1.0),y,x+(tileW*0.5)+(lineoffs*0.5),y+(lineoffs*2), linewidth, "#000");
        drawThickLine( x+(tileW*0.5)-(lineoffs*2.0),y, x+(tileW*0.5)-(lineoffs*2.5),y+(lineoffs*2), linewidth, "#000");
        drawThickLine( x+(tileW*0.5)+(lineoffs*2.5),y,x+(tileW*0.5)+(lineoffs*2.0),y+(lineoffs*2), linewidth, "#000");
        drawThickLine( x+(tileW*0.5)-(lineoffs*3.5),y, x+(tileW*0.5)-(lineoffs*4.0),y+(lineoffs*2), linewidth, "#000");
        drawThickLine( x+(tileW*0.5)+(lineoffs*4.0),y,x+(tileW*0.5)+(lineoffs*3.5),y+(lineoffs*2), linewidth, "#000");
    }
    if(tileno==2||tileno==7||tileno==8||tileno==10||tileno==11||tileno==12||tileno==13){
        // Bottom connectior
        drawThickLine( x+(tileW*0.5)-(lineoffs*1.0),y+tileH,x+(tileW*0.5)-(lineoffs*0.5),y+tileH-(lineoffs*2), linewidth, "#000");
        drawThickLine( x+(tileW*0.5)+(lineoffs*0.5),y+tileH,x+(tileW*0.5)+(lineoffs*1.0),y+tileH-(lineoffs*2), linewidth, "#000");
        drawThickLine( x+(tileW*0.5)-(lineoffs*2.5),y+tileH,x+(tileW*0.5)-(lineoffs*2.0),y+tileH-(lineoffs*2), linewidth, "#000");
        drawThickLine( x+(tileW*0.5)+(lineoffs*2.0),y+tileH,x+(tileW*0.5)+(lineoffs*2.5),y+tileH-(lineoffs*2), linewidth, "#000");
        drawThickLine( x+(tileW*0.5)-(lineoffs*4.0),y+tileH,x+(tileW*0.5)-(lineoffs*3.5),y+tileH-(lineoffs*2), linewidth, "#000");
        drawThickLine( x+(tileW*0.5)+(lineoffs*3.5),y+tileH,x+(tileW*0.5)+(lineoffs*4.0),y+tileH-(lineoffs*2), linewidth, "#000");
    }
    if(tileno==3||tileno==5||tileno==7||tileno==9||tileno==10||tileno==11||tileno==13){
        // Left connectior
        drawThickLine( x,y+(tileH*0.5)-(lineoffs*1.0),x+(lineoffs*2), y+(tileH*0.5)-(lineoffs*0.5), linewidth, "#000");
        drawThickLine( x,y+(tileH*0.5)+(lineoffs*0.5),x+(lineoffs*2), y+(tileH*0.5)+(lineoffs*1.0), linewidth, "#000");
        drawThickLine( x,y+(tileH*0.5)-(lineoffs*2.5),x+(lineoffs*2), y+(tileH*0.5)-(lineoffs*2.0), linewidth, "#000");
        drawThickLine( x,y+(tileH*0.5)+(lineoffs*2.0),x+(lineoffs*2), y+(tileH*0.5)+(lineoffs*2.5), linewidth, "#000");
    }
    if(tileno==3||tileno==7||tileno==10){
        drawThickLine( x,y+(tileH*0.5)-(lineoffs*4.0),x+(lineoffs*2), y+(tileH*0.5)-(lineoffs*3.5), linewidth, "#000");
    }
    if(tileno==3||tileno==5||tileno==9){
        drawThickLine( x,y+(tileH*0.5)+(lineoffs*3.5),x+(lineoffs*2), y+(tileH*0.5)+(lineoffs*4.0), linewidth, "#000");
    }
    if(tileno==4||tileno==6||tileno==8||tileno==9||tileno==10||tileno==12||tileno==13){
        // Right connectior
        drawThickLine( x+tileW,y+(tileH*0.5)-(lineoffs*0.5),x+tileW-(lineoffs*2), y+(tileH*0.5)-(lineoffs*1.0), linewidth, "#000");
        drawThickLine( x+tileW,y+(tileH*0.5)+(lineoffs*1.0),x+tileW-(lineoffs*2), y+(tileH*0.5)+(lineoffs*0.5), linewidth, "#000");
        drawThickLine( x+tileW,y+(tileH*0.5)-(lineoffs*2.0),x+tileW-(lineoffs*2), y+(tileH*0.5)-(lineoffs*2.5), linewidth, "#000");
        drawThickLine( x+tileW,y+(tileH*0.5)+(lineoffs*2.5),x+tileW-(lineoffs*2), y+(tileH*0.5)+(lineoffs*2.0), linewidth, "#000");
    }
    if(tileno==4||tileno==8||tileno==10){
        drawThickLine( x+tileW,y+(tileH*0.5)-(lineoffs*3.5),x+tileW-(lineoffs*2), y+(tileH*0.5)-(lineoffs*4.0), linewidth, "#000");
    }
    if(tileno==4||tileno==6||tileno==9){
        drawThickLine( x+tileW,y+(tileH*0.5)+(lineoffs*4.0),x+tileW-(lineoffs*2), y+(tileH*0.5)+(lineoffs*3.5), linewidth, "#000");   
    }    
}

function highLightTile(xk,yk,color,fillmode,alpha)
{
    c.globalAlpha=alpha;
    c.lineWidth=4; 
    if(fillmode){
        c.fillStyle=color;
        c.fillRect((xk*gridSize)+gridSize,(yk*gridSize),gridSize,gridSize);
    }else{
        c.strokeStyle=color;
        c.strokeRect((xk*gridSize)+gridSize,(yk*gridSize),gridSize,gridSize);    
    }
    c.globalAlpha=1.0;
}

function convertLimit(limit)
{
    if(limit==8) return 8;
    if(limit==12) return 4;
    if(limit==11) return 3;
    if(limit==10) return 2;
    if(limit==9) return 1;
    return 0;
}

//tilemap.push({x:0,y:0,no:8});

function placeTile(xk,yk,setno,tileno)
{
    // We place a tile at a given coordinate
    var tileset=pentominos[setno];
    var items=tileset.pos[tileno];

    // We update tilemap to fit each item
    for(item of pentominos[setno].pos[tileno]){
        if(item.no<17){
            // If tile is inside limits
            if((yk+item.y)>=0&&(yk+item.y)<gridH&&(xk+item.x)>=0&&(xk+item.x)<gridW){
                mapp[yk+item.y][xk+item.x].tileno=item.no;   
                mapp[yk+item.y][xk+item.x].limit=item.limit;
            }
        }else{
            // We set limit to either 8 (no admittance) or to mirror of link tile
            if((yk+item.y)>=0&&(yk+item.y)<gridH&&(xk+item.x)>=0&&(xk+item.x)<gridW){
                mapp[yk+item.y][xk+item.x].limit=[];
            }
        }
    }
}

// Go through list and check availability we give pno and index of variant
function availableTile(xk,yk,setno,tileno)
{
    // We place a tile at a given coordinate
    var tileset=pentominos[0];
    var items=tileset.pos[0];
    var fail=false;
    for(item of items){
        if(((yk+item.y)>=0)&&((yk+item.y)<gridH)&&((xk+item.x)>=0)&&((xk+item.x)<gridW)){
            var state=mapp[yk+item.y][xk+item.x];    
            if(item.no<8){
                    if((item.no==state.limit)||(state.limit==0)){
                        // Do nothing
                    }else{ 
                        fail=true;
                    }
                    //highLightTile((xk+item.x),(yk+item.y),"#84f",fail);
            }else{
                // We must check for overwriting limits if there is an X limit we can not overwrite this with an Y limnit
                itemlimit=convertLimit(item.no);
                if(itemlimit!=state.limit&&state.limit!=0&&itemlimit!=state.tileno){
                    fail=true;
                }
            }
        }else{
            // Outside Bounds
            fail=true;
        }
    }

    // We return whether or not a tile can be placed here
    return fail;
}

// Highlight Pento on Coordinate
function highlightPento(xk,yk,setno,tileno)
{
    // Retrieve candidate tiles
    var pentomino=pentominos[setno];
    var tileset=pentomino.pos[tileno];

    // If we have a connector tile!
    var state=mapp[yk][xk];
    if(state.tileno==LIMITTILE){
        // For each specific tile in tileset
        for(var tile of tileset){
            if(state.limit.indexOf(tile.no)!=-1){
                // tile is available in limit set
                var dx=tile.x;
                var dy=tile.y;
                for(hightile of tileset){
                    if(hightile.no<LIMITTILE||hightile.no==NORMATILE){
                        highLightTile(xk-dx+hightile.x,yk+hightile.y+1-dy,"#000",true,0.5);
                    }
                }                        
            }
        }    
    } 
}

// Find Candidate by Going through all connectors and finding corresponding targets - highlighting purpose
function candidateTile(setno,tileno)
{
    if(mode!=TILEDRAW) return false;

    // Only Connector Tiles
    for(yk=0;yk<gridH;yk++){
        for(xk=0;xk<gridW;xk++){
            highlightPento(xk,yk,setno,tileno);   
        }
    } 
}

function drawMinis()
{
    // HUD
    c.fillStyle="#343";
    c.font = "15px Arial Narrow";
    c.fillText(mx+" "+my,550,40);

    // Draw Minis
    var yk=1;
    var xk=1;

    // Figure out extents    
    for(pento of pentominos){
        for(arr of pento.pos){
            var minx=100;
            var miny=100;
            var maxx=-100;
            var maxy=-100;
            for(item of arr){
                if(item.no<=7){
                    if(item.x<minx) minx=item.x;
                    if(item.y<miny) miny=item.y;
                    if(item.x>maxx) maxx=item.x;
                    if(item.y>maxy) maxy=item.y;               
                }
            }
            
            // Draw Mini Tile Surround Contour
            for(item of arr){        
                if(item.no<=7){
                    c.fillStyle="#000";
                    c.fillRect(((xk-minx+item.x)*4)-1,((yk-miny+item.y)*4)-1,6,6);
                }            
            }
            // Draw Mini Tile Center            
            for(item of arr){        
                if(item.no<=7){
                    c.fillStyle=pento.color;
                    c.fillRect((xk-minx+item.x)*4,(yk-miny+item.y)*4,4,4);
                    if(item.x==0&&item.y==0){
                        c.fillStyle="#000";
                        c.fillRect(((xk-minx+item.x)*4)+1,((yk-miny+item.y)*4)+1,2,2);
                    }
                }            
            }

            yk+=(maxy-miny)+2;
            if(yk>180){
                xk+=7;
                yk=1;
            }       
        }

    }
}

        drawTile(550,(i*gridSize),gridSize,gridSize,1.5,5,i,[]);

        if(i==currSet){
            highLightTile(10,i,"#46b",false,1.0);
        }

        c.fillStyle="#000";
        c.fillText(i,550+(gridSize*0.5),(gridSize*0.5)+(i*gridSize));
    }
}

// Styling function (global styling state)

// Revert Styling (center)

// Pentomino hud. Sub Icons for each possible tile
function drawPentoHud(hudX,hudY)
{

    // We make one Y tile for each 
    for(tileset of pentominos){
        var iconX=hudX;
        var co=0;
        for(items of tileset.pos){
            c.fillStyle="#AA4";
            c.fillRect(iconX+1,hudY+1,gridSize-2,gridSize-2);
            c.fillStyle="#484";
            c.fillRect(iconX+3,hudY+3,gridSize-6,gridSize-6);
            c.fillStyle="#242";
            c.fillRect(iconX+2,hudY+gridSize-3,gridSize-4,3);            

            var cx=tileset.center[co].cx;
            var cy=tileset.center[co].cy;
            co++;
            // console.log(co,cx,cy);

            c.fillStyle="#000";
            var miniSize=gridSize/5;
            for(item of items){
                if(item.no<16&&item.no!=14){
                    c.fillRect(iconX+((item.x+cx)*miniSize),hudY+((item.y+cy)*miniSize),miniSize,miniSize);
                }
            }
            iconX+=gridSize;
        }
        hudY+=gridSize;
    }
    
    // Draw Highlight on top of tiles
    if(highSet>=0&&highTile>=0){
        c.globalAlpha=0.5;
        c.strokeStyle="#6dd";
        c.lineWidth=5;
        c.strokeRect(hudX+(highTile*gridSize),((highSet+1)*gridSize),gridSize,gridSize);
        c.lineWidth=1;
        c.globalAlpha=1.0;
    }
    if(currSet>=0&&currTile>=0){
        c.globalAlpha=0.5;
        c.strokeStyle="#d6d";
        c.lineWidth=5;
        c.strokeRect(hudX+(currTile*gridSize),((currSet+1)*gridSize),gridSize,gridSize);
        c.lineWidth=1;
        c.globalAlpha=1.0;    
    }
}

function drawit()
{	

		c.clearRect(0,0,1000,900);

    // Draw grid
    c.globalAlpha=0.5;
    for(var i=0;i<=gridH;i++){
        c.beginPath();
        if(i==0||i==gridH){
            c.strokeStyle="#F80";        
        }else{
            c.strokeStyle="#080";                
        }
        c.moveTo(gridOffs,gridOffs+(i*gridSize));
        c.lineTo(gridOffs+(gridW*gridSize),gridOffs+(i*gridSize));
        c.moveTo(gridOffs+(i*gridSize),gridOffs);
        c.lineTo(gridOffs+(i*gridSize),gridOffs+(gridH*gridSize));
        
        c.stroke();
    }

    c.globalAlpha=1.0;

    // Redraw Tilemap
    //for(item of tilemap){
    //    drawTile((item.x+5)*gridSize,(item.y+5)*gridSize,gridSize,gridSize,2,8,item.no);
    //}

    if (mode==TILEDRAW) drawPentoHud(550,50);
    if (mode==TILESET){
        drawTileHud();
        drawPentoHud(600,50);
    }

    //placeTile(2,2,3,1);

    // Update tilemap graphic
    for(var yk=0;yk<gridH;yk++){
        for(var xk=0;xk<gridW;xk++){
            if(mapp[yk][xk].tileno>0) drawTile((xk*gridSize)+gridSize,(yk*gridSize)+gridSize,gridSize,gridSize,1.5,5,mapp[yk][xk].tileno,mapp[yk][xk].limit);    
            //if(mapp[yk][xk].limit>0) drawLimit((xk*gridSize)+gridSize,(yk*gridSize)+gridSize,gridSize,gridSize,2,8,mapp[yk][xk].limit);    
        }
    }

    //availableTile(mx,my,5,1);
    if(highSet>=0&&highSet<pentominos.length){
        if(highTile>=0&&highTile<pentominos[highSet].pos.length){
            candidateTile(highSet,highTile);        
        }
    }

    // Draw center tile
    c.globalAlpha=0.5;
    drawCirc(gridOffs+(gridW*gridSize*0.5),gridOffs+(gridH*gridSize*0.5),5,2,"#809");
    c.globalAlpha=1.0;

    

		window.requestAnimationFrame(drawit);
}
